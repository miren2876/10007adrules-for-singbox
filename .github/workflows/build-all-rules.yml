name: Auto Build Sing-box SRS (Full & IP Merged Version)

on:
  workflow_dispatch: 
  schedule:
    - cron: '30 22 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download upstream ALL rule
        run: |
          # 已经替换为你最新发现的 10007_auto 仓库的纯净版链接
          curl -sSL "https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all" -o raw_all.txt

      - name: Merge Domains and IPs using Python
        run: |
          cat << 'EOF' > build_json.py
          import json, re

          ips = set()
          domains_exact = set()
          domains_suffix = set()

          with open("raw_all.txt", "r", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#"):
                      continue
                      
                  # 1. 完美解析 Hosts 格式 (如 0.0.0.0 example.com)
                  if line.startswith("0.0.0.0 ") or line.startswith("127.0.0.1 "):
                      parts = line.split()
                      if len(parts) >= 2:
                          target = parts[1]
                          # 过滤掉 localhost 等本地防投毒地址
                          if target in ["localhost", "hostname"] or target.startswith("ip6-"):
                              continue
                          # 判断它到底是个 IP 还是个域名
                          if re.match(r"^\d{1,3}(\.\d{1,3}){3}$", target):
                              ips.add(target + "/32")
                          else:
                              domains_exact.add(target)
                              
                  # 2. 兼容解析 AdGuard 格式 (如 ||example.com^)
                  elif line.startswith("||") and line.endswith("^"):
                      domain = line[2:-1]
                      domains_suffix.add(domain)

          # 组装为标准的 Sing-box 源码格式
          rules = []
          if ips:
              rules.append({"ip_cidr": list(ips)})
          if domains_exact:
              rules.append({"domain": list(domains_exact)})
          if domains_suffix:
              rules.append({"domain_suffix": list(domains_suffix)})

          output = {
              "version": 2,
              "rules": rules
          }

          with open("all_source.json", "w", encoding="utf-8") as f:
              json.dump(output, f, indent=2)
          EOF
          
          python3 build_json.py

      - name: Compile to Single SRS
        run: |
          docker run --rm -v ${{ github.workspace }}:/workdir -w /workdir ghcr.io/sagernet/sing-box:latest rule-set compile all_source.json -o all.srs

      - name: Commit and Push SRS
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add all.srs
          git commit -m "Auto update merged all.srs" || echo "No changes to commit"
          git push
