name: Auto Build Sing-box SRS (Official Engine)

on:
  workflow_dispatch: 
  schedule:
    - cron: '30 22 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download upstream AdGuard rule
        run: |
          # 直接下载作者处理好的 auto 版纯净规则
          curl -sSL "https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all" -o all.txt

      - name: Convert to SRS using Sing-box Native Engine
        run: |
          # 回归官方最强解析引擎，不再漏掉任何高级规则！
          docker run --rm -v ${{ github.workspace }}:/workdir -w /workdir ghcr.io/sagernet/sing-box:latest rule-set convert --type adguard --output all.srs all.txt

      - name: Commit and Push SRS
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add all.srs
          git commit -m "Auto update all.srs via official converter" || echo "No changes to commit"
          git push
