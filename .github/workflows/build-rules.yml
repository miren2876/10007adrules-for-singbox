name: Auto Build Sing-box SRS

于:
  workflow_dispatch: 
  schedule:
    - cron: '0 22 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    # 👇 修复 128 错误的神器：强行赋予本次运行读写权限
    permissions:
      contents: write  
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download upstream reward rule
        run: |
          curl -sSL "https://raw.githubusercontent.com/lingeringsound/10007/main/reward" -o reward.txt

      - name: Convert to SRS using Sing-box
        run: |
          docker run --rm -v ${{ github.workspace }}:/workdir -w /workdir ghcr.io/sagernet/sing-box:latest rule-set convert --type adguard --output reward.srs reward.txt

      - name: Commit and Push SRS file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reward.srs
          git commit -m "Auto update reward.srs" || echo "No changes to commit"
          git push
