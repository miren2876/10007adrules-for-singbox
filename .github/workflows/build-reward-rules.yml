name: Auto Build Sing-box SRS (Reward Version)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 22 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download upstream reward rule
        run: |
          # 使用你指定的 main 分支 reward 链接
          curl -sSL "https://raw.githubusercontent.com/lingeringsound/10007/main/reward" -o reward.txt

      - name: Convert to SRS using Sing-box Native Engine
        run: |
          docker run --rm -v ${{ github.workspace }}:/workdir -w /workdir ghcr.io/sagernet/sing-box:latest rule-set convert --type adguard --output reward.srs reward.txt

      - name: Commit and Push SRS file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reward.srs
          git commit -m "Auto update reward.srs via official converter" || echo "No changes to commit"
          git push
